# Generic ARM Cortex-M peripheral configuration
# Catch-all for unknown firmware — intercepts common initialization patterns
# Usage: rtosploit rehost --firmware fw.elf --peripheral-config configs/peripherals/generic_arm.yaml

peripherals:
  hal_base:
    model: rtosploit.peripherals.models.stm32_hal.STM32HALBase
    base_addr: 0x00000000
    size: 0

  log_all:
    model: rtosploit.peripherals.models.generic.LogAndReturn
    base_addr: 0x00000000
    size: 0

intercepts:
  # Common HAL init patterns
  - class: rtosploit.peripherals.models.stm32_hal.STM32HALBase
    function: HAL_Init
    symbol: HAL_Init
  - class: rtosploit.peripherals.models.stm32_hal.STM32HALBase
    function: HAL_GetTick
    symbol: HAL_GetTick
  - class: rtosploit.peripherals.models.stm32_hal.STM32HALBase
    function: HAL_Delay
    symbol: HAL_Delay
