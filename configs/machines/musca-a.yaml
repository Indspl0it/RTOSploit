machine:
  name: musca-a
  qemu_machine: musca-a
  cpu: cortex-m33
  architecture: armv8m

memory:
  flash:
    base: 0x10000000
    size: 0x00200000
    permissions: rx
  sram:
    base: 0x30000000
    size: 0x00080000
    permissions: rwx
  peripherals:
    base: 0x40000000
    size: 0x10000000
    permissions: rw
  system:
    base: 0xE0000000
    size: 0x00100000
    permissions: rw

peripherals:
  uart0:
    base: 0x40101000
    size: 0x1000
    irq: 7
  uart1:
    base: 0x40102000
    size: 0x1000
    irq: 8
  timer0:
    base: 0x40000000
    size: 0x1000
    irq: 3
  timer1:
    base: 0x40001000
    size: 0x1000
    irq: 4
  watchdog:
    base: 0x40081000
    size: 0x1000
    irq: 0
  systick:
    base: 0xE000E010
    size: 0x10
    builtin: true
  nvic:
    base: 0xE000E100
    size: 0xC00
    builtin: true
  scb:
    base: 0xE000ED00
    size: 0x100
    builtin: true
  sau:
    base: 0xE000EDD0
    size: 0x30
    builtin: true
