machine:
  name: netduinoplus2
  qemu_machine: netduinoplus2
  cpu: cortex-m4
  architecture: armv7em

memory:
  flash:
    base: 0x08000000
    size: 0x00100000
    permissions: rx
  sram:
    base: 0x20000000
    size: 0x00020000
    permissions: rwx
  peripherals:
    base: 0x40000000
    size: 0x20000000
    permissions: rw
  system:
    base: 0xE0000000
    size: 0x00100000
    permissions: rw

peripherals:
  usart1:
    base: 0x40011000
    size: 0x400
    irq: 37
  usart2:
    base: 0x40004400
    size: 0x400
    irq: 38
  usart3:
    base: 0x40004800
    size: 0x400
    irq: 39
  timer2:
    base: 0x40000000
    size: 0x400
    irq: 28
  timer3:
    base: 0x40000400
    size: 0x400
    irq: 29
  timer4:
    base: 0x40000800
    size: 0x400
    irq: 30
  rcc:
    base: 0x40023800
    size: 0x400
  systick:
    base: 0xE000E010
    size: 0x10
    builtin: true
  nvic:
    base: 0xE000E100
    size: 0xC00
    builtin: true
  scb:
    base: 0xE000ED00
    size: 0x100
    builtin: true
