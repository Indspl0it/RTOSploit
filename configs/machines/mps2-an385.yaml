machine:
  name: mps2-an385
  qemu_machine: mps2-an385
  cpu: cortex-m3
  architecture: armv7m

memory:
  flash:
    base: 0x00000000
    size: 0x00400000
    permissions: rx
  sram:
    base: 0x20000000
    size: 0x00400000
    permissions: rwx
  peripherals:
    base: 0x40000000
    size: 0x20000000
    permissions: rw
  system:
    base: 0xE0000000
    size: 0x00100000
    permissions: rw

peripherals:
  uart0:
    base: 0x40004000
    size: 0x1000
    irq: 0
  uart1:
    base: 0x40005000
    size: 0x1000
    irq: 1
  timer0:
    base: 0x40000000
    size: 0x1000
    irq: 8
  timer1:
    base: 0x40001000
    size: 0x1000
    irq: 9
  systick:
    base: 0xE000E010
    size: 0x10
    builtin: true
  nvic:
    base: 0xE000E100
    size: 0xC00
    builtin: true
  scb:
    base: 0xE000ED00
    size: 0x100
    builtin: true
