machine:
  name: mps2-an505
  qemu_machine: mps2-an505
  cpu: cortex-m33
  architecture: armv8m

memory:
  flash:
    base: 0x00000000
    size: 0x00200000
    permissions: rx
  sram:
    base: 0x20000000
    size: 0x00200000
    permissions: rwx
  secure_flash:
    base: 0x10000000
    size: 0x00200000
    permissions: rx
  secure_sram:
    base: 0x30000000
    size: 0x00200000
    permissions: rwx
  peripherals:
    base: 0x40000000
    size: 0x10000000
    permissions: rw
  system:
    base: 0xE0000000
    size: 0x00100000
    permissions: rw

peripherals:
  uart0:
    base: 0x40004000
    size: 0x1000
    irq: 0
  timer0:
    base: 0x40000000
    size: 0x1000
    irq: 8
  systick:
    base: 0xE000E010
    size: 0x10
    builtin: true
  nvic:
    base: 0xE000E100
    size: 0xC00
    builtin: true
  sau:
    base: 0xE000EDD0
    size: 0x50
    builtin: true
