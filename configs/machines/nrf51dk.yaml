machine:
  name: nrf51dk
  qemu_machine: nrf51
  cpu: cortex-m0
  architecture: armv6m

memory:
  flash:
    base: 0x00000000
    size: 0x00040000
    permissions: rx
  sram:
    base: 0x20000000
    size: 0x00008000
    permissions: rwx
  peripherals:
    base: 0x40000000
    size: 0x10000000
    permissions: rw
  system:
    base: 0xE0000000
    size: 0x00100000
    permissions: rw

peripherals:
  uart0:
    base: 0x40002000
    size: 0x1000
    irq: 2
  timer0:
    base: 0x40008000
    size: 0x1000
    irq: 8
  timer1:
    base: 0x40009000
    size: 0x1000
    irq: 9
  timer2:
    base: 0x4000A000
    size: 0x1000
    irq: 10
  gpio:
    base: 0x50000000
    size: 0x1000
    irq: 6
  rng:
    base: 0x4000D000
    size: 0x1000
    irq: 13
  systick:
    base: 0xE000E010
    size: 0x10
    builtin: true
  nvic:
    base: 0xE000E100
    size: 0xC00
    builtin: true
  scb:
    base: 0xE000ED00
    size: 0x100
    builtin: true
