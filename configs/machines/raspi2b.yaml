machine:
  name: raspi2b
  qemu_machine: raspi2b
  cpu: cortex-a7
  architecture: armv7a

memory:
  ram:
    base: 0x00000000
    size: 0x40000000
    permissions: rwx
  peripherals:
    base: 0x3F000000
    size: 0x01000000
    permissions: rw

peripherals:
  uart0:
    base: 0x3F201000
    size: 0x1000
    irq: 57
  aux_uart:
    base: 0x3F215000
    size: 0x100
    irq: 29
  system_timer:
    base: 0x3F003000
    size: 0x1000
    irq: 1
  arm_timer:
    base: 0x3F00B000
    size: 0x1000
  interrupt_controller:
    base: 0x3F00B200
    size: 0x200
  gpio:
    base: 0x3F200000
    size: 0x1000
  mailbox:
    base: 0x3F00B880
    size: 0x40
