fuzzer:
  timeout_ms: 2000
  watchdog_ms: 1000
  memory_limit_mb: 512
  corpus_max_size: 50000
  crash_dedup: true

coverage:
  mode: edge+mmio
  bitmap_size: 65536

crash_detection:
  hardfault_hook: true
  busfault_hook: true
  memmanage_hook: true
  usagefault_hook: true
  watchdog: true
  stack_canary: true
  heap_validation: true
  shadow_memory: true

mutation:
  max_input_size: 8192
  dictionary: null
  mmio_pool_size: 2048

instrumentation:
  exceptions: true
  memory_access: true
  basic_blocks: true
  interrupts: true
  syscalls: true
  peripherals: true
  task_switches: true
  heap_operations: true
  stack_tracking: true
  trace_level: verbose
  trace_max_size_mb: 500
  ring_buffer_events: 131072
  sampling_rate: 1
