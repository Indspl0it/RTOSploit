<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
    <linearGradient id="redglow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f85149"/>
      <stop offset="100%" style="stop-color:#ff7b72"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="0.5"/>
    </pattern>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.5" fill="#30363d"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#grid)" opacity="0.4"/>
  <rect width="1200" height="300" fill="url(#dots)" opacity="0.3"/>

  <!-- Decorative circuit traces -->
  <g stroke="#21262d" stroke-width="1.5" fill="none" opacity="0.6">
    <!-- Left traces -->
    <path d="M 0 80 H 80 L 100 60 H 160"/>
    <path d="M 0 120 H 60 L 80 100 H 130"/>
    <path d="M 0 200 H 40 L 60 180 H 120"/>
    <circle cx="160" cy="60" r="3" fill="#21262d"/>
    <circle cx="130" cy="100" r="3" fill="#21262d"/>
    <circle cx="120" cy="180" r="3" fill="#21262d"/>
    <!-- Right traces -->
    <path d="M 1200 100 H 1120 L 1100 120 H 1040"/>
    <path d="M 1200 160 H 1140 L 1120 140 H 1070"/>
    <path d="M 1200 220 H 1160 L 1140 200 H 1080"/>
    <circle cx="1040" cy="120" r="3" fill="#21262d"/>
    <circle cx="1070" cy="140" r="3" fill="#21262d"/>
    <circle cx="1080" cy="200" r="3" fill="#21262d"/>
  </g>

  <!-- Glowing accent traces -->
  <g stroke="url(#accent)" stroke-width="1" fill="none" opacity="0.3" filter="url(#softglow)">
    <path d="M 200 60 H 350 L 370 80"/>
    <path d="M 830 80 L 850 60 H 1000"/>
    <path d="M 200 240 H 300 L 320 220"/>
    <path d="M 880 220 L 900 240 H 1000"/>
  </g>

  <!-- MCU chip outline (left) -->
  <g transform="translate(160, 100)" opacity="0.15">
    <rect x="0" y="0" width="80" height="80" rx="4" fill="none" stroke="#58a6ff" stroke-width="1.5"/>
    <!-- Pins -->
    <line x1="-10" y1="15" x2="0" y2="15" stroke="#58a6ff" stroke-width="1.5"/>
    <line x1="-10" y1="30" x2="0" y2="30" stroke="#58a6ff" stroke-width="1.5"/>
    <line x1="-10" y1="45" x2="0" y2="45" stroke="#58a6ff" stroke-width="1.5"/>
    <line x1="-10" y1="60" x2="0" y2="60" stroke="#58a6ff" stroke-width="1.5"/>
    <line x1="80" y1="15" x2="90" y2="15" stroke="#58a6ff" stroke-width="1.5"/>
    <line x1="80" y1="30" x2="90" y2="30" stroke="#58a6ff" stroke-width="1.5"/>
    <line x1="80" y1="45" x2="90" y2="45" stroke="#58a6ff" stroke-width="1.5"/>
    <line x1="80" y1="60" x2="90" y2="60" stroke="#58a6ff" stroke-width="1.5"/>
    <line x1="15" y1="-10" x2="15" y2="0" stroke="#58a6ff" stroke-width="1.5"/>
    <line x1="35" y1="-10" x2="35" y2="0" stroke="#58a6ff" stroke-width="1.5"/>
    <line x1="55" y1="-10" x2="55" y2="0" stroke="#58a6ff" stroke-width="1.5"/>
    <line x1="15" y1="80" x2="15" y2="90" stroke="#58a6ff" stroke-width="1.5"/>
    <line x1="35" y1="80" x2="35" y2="90" stroke="#58a6ff" stroke-width="1.5"/>
    <line x1="55" y1="80" x2="55" y2="90" stroke="#58a6ff" stroke-width="1.5"/>
    <!-- Die marker -->
    <circle cx="15" cy="15" r="5" fill="none" stroke="#58a6ff" stroke-width="1"/>
  </g>

  <!-- MCU chip outline (right) -->
  <g transform="translate(960, 110)" opacity="0.12">
    <rect x="0" y="0" width="70" height="70" rx="4" fill="none" stroke="#bc8cff" stroke-width="1.5"/>
    <line x1="-10" y1="15" x2="0" y2="15" stroke="#bc8cff" stroke-width="1.5"/>
    <line x1="-10" y1="30" x2="0" y2="30" stroke="#bc8cff" stroke-width="1.5"/>
    <line x1="-10" y1="45" x2="0" y2="45" stroke="#bc8cff" stroke-width="1.5"/>
    <line x1="-10" y1="55" x2="0" y2="55" stroke="#bc8cff" stroke-width="1.5"/>
    <line x1="70" y1="15" x2="80" y2="15" stroke="#bc8cff" stroke-width="1.5"/>
    <line x1="70" y1="30" x2="80" y2="30" stroke="#bc8cff" stroke-width="1.5"/>
    <line x1="70" y1="45" x2="80" y2="45" stroke="#bc8cff" stroke-width="1.5"/>
    <line x1="70" y1="55" x2="80" y2="55" stroke="#bc8cff" stroke-width="1.5"/>
    <circle cx="15" cy="15" r="4" fill="none" stroke="#bc8cff" stroke-width="1"/>
  </g>

  <!-- Hex dump decoration (subtle) -->
  <text x="300" y="55" font-family="monospace" font-size="9" fill="#21262d" opacity="0.5">48 41 4C 5F 55 41 52 54 5F 52 65 63 65 69 76 65</text>
  <text x="300" y="67" font-family="monospace" font-size="9" fill="#21262d" opacity="0.4">76 54 61 73 6B 53 74 61 72 74 53 63 68 65 64 75</text>
  <text x="750" y="248" font-family="monospace" font-size="9" fill="#21262d" opacity="0.5">E0 00 E1 00 40 00 44 00 20 00 00 00 08 00 00 00</text>
  <text x="750" y="260" font-family="monospace" font-size="9" fill="#21262d" opacity="0.4">FF FF FF FF 00 00 00 01 40 02 30 00 E0 00 ED 00</text>

  <!-- Main title -->
  <text x="600" y="120" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="64" fill="url(#accent)" filter="url(#glow)" letter-spacing="-1">
    RTOSploit
  </text>

  <!-- Subtitle -->
  <text x="600" y="160" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="18" fill="#8b949e" letter-spacing="4">
    RTOS EXPLOITATION &amp; BARE-METAL FUZZING FRAMEWORK
  </text>

  <!-- Divider line -->
  <line x1="380" y1="178" x2="820" y2="178" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>

  <!-- Feature pills -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="500">
    <!-- Pill 1 -->
    <rect x="295" y="195" width="95" height="26" rx="13" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.5"/>
    <text x="342" y="212" text-anchor="middle" fill="#58a6ff">FreeRTOS</text>

    <!-- Pill 2 -->
    <rect x="400" y="195" width="85" height="26" rx="13" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.5"/>
    <text x="442" y="212" text-anchor="middle" fill="#58a6ff">ThreadX</text>

    <!-- Pill 3 -->
    <rect x="495" y="195" width="75" height="26" rx="13" fill="none" stroke="#bc8cff" stroke-width="1" opacity="0.5"/>
    <text x="532" y="212" text-anchor="middle" fill="#bc8cff">Zephyr</text>

    <!-- Pill 4 -->
    <rect x="580" y="195" width="100" height="26" rx="13" fill="none" stroke="#f85149" stroke-width="1" opacity="0.5"/>
    <text x="630" y="212" text-anchor="middle" fill="#f85149">Cortex-M</text>

    <!-- Pill 5 -->
    <rect x="690" y="195" width="80" height="26" rx="13" fill="none" stroke="#f85149" stroke-width="1" opacity="0.5"/>
    <text x="730" y="212" text-anchor="middle" fill="#f85149">RISC-V</text>

    <!-- Pill 6 -->
    <rect x="780" y="195" width="120" height="26" rx="13" fill="none" stroke="#3fb950" stroke-width="1" opacity="0.5"/>
    <text x="840" y="212" text-anchor="middle" fill="#3fb950">No Hardware</text>
  </g>

  <!-- Bottom tagline -->
  <text x="600" y="260" text-anchor="middle" font-family="monospace" font-size="12" fill="#484f58" letter-spacing="1">
    Analyze &#x2022; Assess &#x2022; Exploit &#x2022; Rehost &#x2022; Fuzz &#x2022; Report &#x2014; Software-Only via QEMU
  </text>

  <!-- Subtle border -->
  <rect x="0" y="0" width="1200" height="300" fill="none" stroke="#30363d" stroke-width="1"/>
  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accent)" opacity="0.6"/>
</svg>
